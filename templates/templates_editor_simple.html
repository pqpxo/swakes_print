<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quick Template Editor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='editor_simple.css') }}">
</head>

<body class="p-4">

<nav class="navbar navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Label Printer</a>
    <div>
      <a class="btn btn-light me-2" href="/templates/simple">Quick Template Editor</a>
      <a class="btn btn-outline-light" href="/templates">Advanced Template Editor</a>
    </div>
  </div>
</nav>

<h2>Quick Template Editor</h2>

<div class="row">
  <!-- Left Panel -->
  <div class="col-md-4">

    <h4>Tools</h4>
    <button class="btn btn-primary mb-2" onclick="addText()">Add Text</button>
    <button class="btn btn-primary mb-2" onclick="addQR()">Add QR</button>
    <button class="btn btn-primary mb-2" onclick="triggerImageUpload()">Add Image</button>
    <input type="file" id="image-upload" class="d-none" onchange="uploadImage()">

    <hr>

    <h4>Element Properties</h4>

    <label>Text</label>
    <textarea id="prop-text" class="form-control mb-2" onchange="updateSelectedText()"></textarea>

    <hr>

    <h4>Template</h4>
    <input id="template-name" class="form-control mb-2" placeholder="Template name">

    <button class="btn btn-success mb-2" onclick="saveTemplate()">Save</button>
    <button class="btn btn-danger mb-2" onclick="deleteTemplate()">Delete</button>

  </div>

  <!-- Canvas -->
  <div class="col-md-8">
    <h4>Canvas</h4>
    <div id="canvas"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='editor_simple.js') }}"></script>

</body>
</html>
